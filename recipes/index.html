<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RecipeBook</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="Find simple and delicious recipes">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:image" content="images/social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="Find simple and delicious recipes">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <!-- favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Apple icon -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

</head>


<body>

    <!-- HEADER -->
    <header>

        <div class="logo-area">

            <img src="images/recipe-book.png" alt="RecipeBook logo">

            <h1>RecipeBook</h1>

        </div>

    </header>



    <!-- SEARCH -->
    <section class="search-area">

        <input type="text" placeholder="Find a recipe">

        <button>
            <img src="images/search.svg" alt="Search">
        </button>

    </section>



    <!-- RECIPE -->
    <main>

        <article class="recipe-card">

            <img class="recipe-image"
                 src="images/apple-crisp.jpg"
                 alt="Apple crisp with vanilla ice cream">

            <div class="recipe-info">

                <span class="tag">dessert</span>

                <h2>Apple Crisp</h2>

                <span class="rating"
                      role="img"
                      aria-label="Rating: 4 out of 5 stars">

                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>

                </span>

                <p class="description">
                    This apple crisp recipe is a simple yet delicious fall dessert
                    that's great served warm with vanilla ice cream.
                </p>

            </div>

        </article>

    </main>



    <!-- FOOTER -->
    <footer>

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">

            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->

            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>

            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>

            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>

        </div>

    </footer>

</body>
</html>
